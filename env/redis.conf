# Cấu hình Redis dùng cho kênh Pub/Sub đồng bộ blacklist.
# Redis đóng vai trò hạ tầng (infrastructure), không phải code nghiệp vụ.
# Chỉnh bind address, port, và các thông số bảo mật cơ bản tại đây.
# bind 192.168.56.10
# port 6379
# ------------------------------------------------------------------
# redis.conf — Cấu hình Redis cho hệ thống Tường lửa Phân tán
#
# Cách dùng:
#   redis-server /home/vagrant/project/env/redis.conf
#   # Hoặc copy vào /etc/redis/redis.conf rồi:
#   sudo systemctl restart redis-server
#
# Triết lý cấu hình:
#   File này tối ưu cho một vai trò rất cụ thể: làm Message Broker
#   cho hệ thống Pub/Sub real-time + lưu persistent blacklist Set.
#   Không cần tính năng Redis nâng cao (cluster, replication, ACL phức tạp).
#   Ưu tiên: độ trễ thấp > dung lượng lớn > tính năng phong phú.

# ══════════════════════════════════════════════════════════════════════════════
# PHẦN 1: Network — Cho phép VM2 kết nối vào Redis trên VM1
# ══════════════════════════════════════════════════════════════════════════════

# Bind tất cả interfaces thay vì chỉ localhost.
# Mặc định Redis chỉ bind 127.0.0.1 — VM2 sẽ không kết nối được.
# Trong môi trường lab (host-only network, không expose internet), điều này an toàn.
bind 0.0.0.0

# Port mặc định — giữ nguyên để khớp với biến môi trường REDIS_PORT=6379
port 6379

# Tắt protected-mode: chế độ này từ chối kết nối từ ngoài nếu không có
# password VÀ không bind localhost. Vì ta đã bind 0.0.0.0, cần tắt để
# VM2 kết nối được mà không cần password (lab environment).
protected-mode no

# Timeout cho idle connection: 0 = không timeout.
# node_agent.py giữ kết nối subscribe lâu dài — nếu timeout quá ngắn,
# connection sẽ bị đóng giữa chừng và agent phải reconnect liên tục.
timeout 0

# TCP keepalive: gửi ping mỗi 60 giây để detect broken connections sớm.
# Quan trọng để node_agent phát hiện mất kết nối nhanh và trigger reconnect.
tcp-keepalive 60

# ══════════════════════════════════════════════════════════════════════════════
# PHẦN 2: Persistence — Bảo vệ blacklist khi VM1 reboot
#
# Đây là phần quan trọng nhất mà cấu hình mặc định bỏ qua.
#
# Vấn đề: Redis mặc định chỉ lưu data trong RAM. Khi VM1 reboot,
# toàn bộ Set "firewall:persistent:blacklist" biến mất. Khi các edge node
# khởi động lại và gọi _cold_start_sync(), chúng sẽ nhận được Set rỗng
# và load 0 IP vào eBPF Map — toàn bộ lịch sử blacklist bị mất.
#
# Giải pháp: Bật RDB snapshot (đủ cho lab) để Redis ghi blacklist
# ra disk định kỳ. Khi restart, Redis tự load lại từ file snapshot.
#
# RDB vs AOF:
#   RDB (snapshot): ghi toàn bộ dataset ra file .rdb định kỳ.
#     Ưu: nhỏ gọn, load nhanh khi restart, đủ dùng cho lab.
#     Nhược: có thể mất dữ liệu trong khoảng giữa 2 lần snapshot.
#   AOF (Append Only File): ghi từng lệnh write vào log file.
#     Ưu: gần như không mất dữ liệu.
#     Nhược: file lớn hơn, replay chậm hơn khi restart.
#
#   Cho đồ án này: RDB là đủ. Mất vài giây blacklist trong khoảng
#   giữa 2 snapshot là chấp nhận được — điều quan trọng là sau reboot
#   hệ thống phục hồi được trạng thái gần nhất.
# ══════════════════════════════════════════════════════════════════════════════

# Bật RDB snapshot với 3 ngưỡng kích hoạt:
#   "save 900 1"  : Nếu có ít nhất 1 thay đổi trong 15 phút → snapshot
#   "save 300 10" : Nếu có ít nhất 10 thay đổi trong 5 phút → snapshot
#   "save 60 100" : Nếu có ít nhất 100 thay đổi trong 1 phút → snapshot
#
# Ngưỡng thứ ba (60 giây / 100 thay đổi) quan trọng nhất cho lab:
# Trong kịch bản tấn công, Honeypot có thể report hàng chục IP trong
# vài phút — snapshot sẽ được trigger sớm để bảo vệ dữ liệu.
save 900 1
save 300 10
save 60 100

# Tên file snapshot và thư mục lưu
dbfilename firewall-blacklist.rdb

# Thư mục làm việc — Redis lưu .rdb file và .aof file tại đây.
# /var/lib/redis là thư mục chuẩn trên Ubuntu, đã có sẵn sau khi cài redis-server.
dir /var/lib/redis

# Nếu RDB snapshot thất bại (disk đầy...), Redis sẽ từ chối write mới
# để tránh tình trạng "nghĩ là đã lưu nhưng thực ra không lưu".
# Đây là fail-safe quan trọng cho data integrity.
stop-writes-on-bgsave-error yes

# Nén file RDB bằng LZ4 để tiết kiệm disk space.
rdbcompression yes

# Checksum để phát hiện file RDB bị corrupt.
rdbchecksum yes

# ══════════════════════════════════════════════════════════════════════════════
# PHẦN 3: Memory — Giới hạn RAM để Redis không ăn hết bộ nhớ VM
# ══════════════════════════════════════════════════════════════════════════════

# Giới hạn tối đa 256MB RAM cho Redis trên VM1 (VM1 có 1024MB).
# Blacklist 65536 IP × ~64 bytes/entry ≈ 4MB — giới hạn này quá thoải mái.
# Mục đích: đảm bảo còn RAM cho Python processes (honeypot + node_agent).
maxmemory 256mb

# Chính sách khi đạt maxmemory: allkeys-lru
# Tự động xóa key ít được dùng nhất khi cần thêm bộ nhớ.
# Phù hợp vì ta không muốn Redis crash — thà mất một số IP cũ trong
# blacklist còn hơn Redis bị OOM killed.
maxmemory-policy allkeys-lru

# ══════════════════════════════════════════════════════════════════════════════
# PHẦN 4: Pub/Sub — Tối ưu cho message broker
# ══════════════════════════════════════════════════════════════════════════════

# Kích thước buffer cho Pub/Sub client (bytes).
# Mỗi blacklist message ~300 bytes JSON, 100 message buffer là quá đủ.
# Tăng lên để tránh slow subscriber (node_agent chậm) bị disconnect.
client-output-buffer-limit pubsub 32mb 8mb 60

# ══════════════════════════════════════════════════════════════════════════════
# PHẦN 5: Logging — Đủ thông tin để debug mà không spam
# ══════════════════════════════════════════════════════════════════════════════

# Log level: notice — in các sự kiện quan trọng (startup, shutdown, snapshot)
# nhưng không spam debug messages. Dùng "verbose" nếu cần debug Redis.
loglevel notice

# Log ra file thay vì chỉ stdout — dễ xem lại sau.
logfile /var/log/redis/redis-server.log

# ══════════════════════════════════════════════════════════════════════════════
# PHẦN 6: Slow Log — Phát hiện lệnh Redis chậm bất thường
#
# Trong hệ thống real-time như thế này, một lệnh Redis chậm có thể
# làm tăng latency đo được trong sync_latency_test.py.
# Slow log giúp phát hiện nguyên nhân nếu latency đột ngột cao.
# ══════════════════════════════════════════════════════════════════════════════

# Log lệnh nào chạy chậm hơn 10ms (10000 microseconds)
slowlog-log-slower-than 10000

# Giữ tối đa 128 entry trong slow log
slowlog-max-len 128